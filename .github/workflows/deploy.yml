name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nba-fantasy-league-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nba-fantasy-league-src

      - name: Build
        run: npx vite build
        working-directory: nba-fantasy-league-src

      - name: Assemble site
        run: |
          mkdir -p _site/nba-fantasy-league
          cp index.html _site/
          cp -r nba-fantasy-league-src/dist/* _site/nba-fantasy-league/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
